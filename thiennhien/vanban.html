<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thư Viện Ảnh Tương Tác</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1>Thư Viện Ảnh</h1>
    <p class="subtitle">Di chuột qua ảnh bên dưới để xem trước</p>
  </header>

  <main class="container">

    <!-- Khung xem trước -->
    <div id="image" class="preview-box">
      <p id="caption">Di chuột qua hình ảnh bên dưới để hiển thị tại đây.</p>
    </div>

    <!-- Lưới ảnh thumbnail -->
    <div class="thumbs">
      <img
        src="Abandoned Train, 2km.jpg"
        alt="Rừng xanh mướt mùa hè"
        class="thumb"
      />
      <img
        src="tải xuống (18).jpg"
        alt="Đại dương xanh biếc"
        class="thumb"
      />
      <img
        src="yucong tang.jpg"
        alt="Núi tuyết hùng vĩ"
        class="thumb"
      />
      <img
        src="anhnang.jpg"
        alt="Ánh nắng chiều tà"
        class="thumb"
      />
      <img
        src="samac.jpg"
        alt="Sa mạc hoàng hôn"
        class="thumb"
      />
      <img
        src="tải xuống (19).jpg"
        alt="Đồng cỏ xanh bát ngát"
        class="thumb"
      />
      <img
        src="Tanla.jpg"
        alt="Dưới tán lá cây"
        class="thumb"
      />
      <img
        src="Victorian Conservatory, Julia Kodl.jpg"
        alt="Nhà kính"
        class="thumb"
      />
    </div>

  </main>

  <script src="javan.js"></script>
</body>
</html>
