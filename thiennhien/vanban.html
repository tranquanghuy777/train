<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thư Viện Ảnh Tương Tác</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1>Thư Viện Ảnh</h1>
    <p class="subtitle">Di chuột qua ảnh bên dưới để xem trước</p>
  </header>

  <main class="container">

    <div id="image" class="preview-box">
      <p id="caption">Di chuột qua hình ảnh bên dưới để hiển thị tại đây.</p>
    </div>

    <div class="thumbs">
      <img
        src="AbandonedTrain2km.jpg"
        alt="Rừng xanh mướt mùa hè"
        class="thumb"
      />
      <img
        src="gayt.jpg"
        alt="Đại dương xanh biếc"
        class="thumb"
      />
      <img
        src="yucongtang.jpg"
        alt="Núi tuyết hùng vĩ"
        class="thumb"
      />
      <img
        src="anhnang.jpg"
        alt="Ánh nắng chiều tà"
        class="thumb"
      />
      <img
        src="samac.jpg"
        alt="Sa mạc hoàng hôn"
        class="thumb"
      />
      <img
        src="mm.jpg"
        alt="Đồng cỏ xanh bát ngát"
        class="thumb"
      />
      <img
        src="Tanla.jpg"
        alt="Dưới tán lá cây"
        class="thumb"
      />
      <img
        src="VictorianConservatoryJuliaKodl.jpg"
        alt="Nhà kính"
        class="thumb"
      />
    </div>

  </main>

  <script src="javan.js"></script>
</body>
</html>
